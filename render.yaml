services:
  - type: pgsql
    name: lowcoder-db
    disk:
      name: lowcoder-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
    envVars:
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_USER
        value: lowcoder
      - key: POSTGRES_DB
        value: lowcoder

  - type: redis
    name: lowcoder-redis
    envVars:
      - key: REDIS_PASSWORD
        generateValue: true

  - type: web
    name: lowcoder
    env: node  # Node.js runtime
    buildCommand: npm ci && npm run build  # Matches Lowcoder's scripts
    startCommand: npm run start:prod  # Or 'npm start' if defined
    envVars:
      - key: NODE_ENV
        value: production
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: lowcoder-db
          property: password
      - key: POSTGRES_URL
        fromDatabase:
          name: lowcoder-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: lowcoder-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: lowcoder-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: lowcoder-db
          property: user
      - key: POSTGRES_DB
        fromDatabase:
          name: lowcoder-db
          property: database
      - key: REDIS_URL
        fromService:
          name: lowcoder-redis
          type: redis
          property: connectionString
      - key: SERVER_GIT_ENABLED
        value: true
      - key: SERVER_OAUTH_ENABLED
        value: true
    # Lowcoder runs on port 3000 by default

